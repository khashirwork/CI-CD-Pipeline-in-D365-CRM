name: Export and Deploy Solution with Versioning

"on":
  workflow_dispatch:
    inputs:
      solution_name:
        description: "Solution name to export (e.g., TestSolution)"
        required: true
        type: string

      solution_type:
        description: "Choose solution type"
        required: true
        type: choice
        options:
        - Managed
        - Unmanaged
        default: Managed

      version_bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
        - patch
        - minor
        - major
        default: patch

      import_strategy:
        description: "For Managed only → update or upgrade"
        required: false
        type: choice
        options:
        - update
        - upgrade
        default: update

      release_notes:
        description: "What changed in this version?"
        required: true
        type: string

jobs:
  export-and-version:
    runs-on: windows-latest

    outputs:
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup Power Platform CLI
      uses: microsoft/powerplatform-actions/actions-install@v1.0.0

    # =========================================================
    # EXPORT SOLUTION
    # =========================================================
    - name: Export solution from DEV
      uses: microsoft/powerplatform-actions/export-solution@v1.0.0
      with:
        environment-url: "${{ secrets.DEV_URL }}"
        app-id: "${{ secrets.CLIENT_ID }}"
        client-secret: "${{ secrets.CLIENT_SECRET }}"
        tenant-id: "${{ secrets.TENANT_ID }}"
        solution-name: "${{ inputs.solution_name }}"
        solution-output-file: "solutions/zip_files/${{ inputs.solution_name }}.zip"
        managed: ${{ inputs.solution_type == 'Managed' }}
        overwrite: true

    # =========================================================
    # UNPACK SOLUTION
    # =========================================================
    - name: Unpack solution
      uses: microsoft/powerplatform-actions/unpack-solution@v1.0.0
      with:
        solution-file: "solutions/zip_files/${{ inputs.solution_name }}.zip"
        solution-folder: "solutions/${{ inputs.solution_name }}"
        solution-type: "${{ inputs.solution_type }}"

    # =========================================================
    # READ & UPDATE VERSION
    # =========================================================
    - name: Read current version
      id: version
      shell: pwsh
      run: |
        
        $solutionXml = "solutions/${{ inputs.solution_name }}/Other/Solution.xml"

        if (Test-Path $solutionXml) {

          [xml]$xml = Get-Content $solutionXml

          $currentVersion = $xml.ImportExportXml.SolutionManifest.Version

          Write-Host "Current version: $currentVersion"

          $parts = $currentVersion -split '\.'

          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $build = [int]$parts[2]
          $revision = [int]$parts[3]

          switch ("${{ inputs.version_bump }}") {

            "major" {
              $major++
              $minor = 0
              $build = 0
              $revision = 0
            }

            "minor" {
              $minor++
              $build = 0
              $revision = 0
            }

            "patch" {
              $revision++
            }
          }

          $newVersion = "$major.$minor.$build.$revision"

          Write-Host "New version: $newVersion"

          $xml.ImportExportXml.SolutionManifest.Version = $newVersion

          $xml.Save($solutionXml)

          "new_version=$newVersion" >> $env:GITHUB_OUTPUT
          "old_version=$currentVersion" >> $env:GITHUB_OUTPUT

        }
        else {

          Write-Host "Solution.xml not found!"

          exit 1
        }

    # =========================================================
    # COMMIT VERSION CHANGES
    # =========================================================
    - name: Commit changes with version
      shell: pwsh
      run: |
        
        git config user.name "GitHub Actions Bot"

        git config user.email "actions@github.com"

        git add .

        git commit -m "Release ${{ inputs.solution_name }} v${{ steps.version.outputs.new_version }}" || Write-Host "No changes to commit"

        git push

    # =========================================================
    # CREATE TAG
    # =========================================================
    - name: Create Git Tag
      shell: pwsh
      run: |
        
        git tag -a "v${{ steps.version.outputs.new_version }}-${{ inputs.solution_name }}" -m "Release ${{ inputs.solution_name }} v${{ steps.version.outputs.new_version }}"

        git push origin "v${{ steps.version.outputs.new_version }}-${{ inputs.solution_name }}"

  # =========================================================
  # DEPLOY JOB
  # =========================================================
  deploy-to-target:
    runs-on: windows-latest

    needs: export-and-version

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        ref: main

    - name: Pull latest changes
      shell: pwsh
      run: |
        git pull origin main

    - name: Setup Power Platform CLI
      uses: microsoft/powerplatform-actions/actions-install@v1.0.0

    # =========================================================
    # PACK SOLUTION
    # =========================================================
    - name: Pack solution
      uses: microsoft/powerplatform-actions/pack-solution@v1.0.0
      with:
        solution-folder: "solutions/${{ inputs.solution_name }}"
        solution-file: "solutions/zip_files/${{ inputs.solution_name }}_v${{ needs.export-and-version.outputs.new_version }}.zip"
        solution-type: "${{ inputs.solution_type }}"

    # =========================================================
    # RUN SOLUTION CHECKER
    # =========================================================
    - name: Run Solution Checker
      uses: microsoft/powerplatform-actions/check-solution@v1.0.0
      with:
        environment-url: "${{ secrets.DEV_URL }}"
        app-id: "${{ secrets.CLIENT_ID }}"
        client-secret: "${{ secrets.CLIENT_SECRET }}"
        tenant-id: "${{ secrets.TENANT_ID }}"

        path: "solutions/zip_files/${{ inputs.solution_name }}_v${{ needs.export-and-version.outputs.new_version }}.zip"

        rule-set: "0ad12346-e108-40b8-a956-9a8f95ea18c9"

        fail-on-error: false

    # =========================================================
    # MANAGED → UPGRADE FLOW
    # =========================================================
    - name: Apply Upgrade (Stage Holding Solution)
      if: inputs.solution_type == 'Managed' && inputs.import_strategy == 'upgrade'
      uses: microsoft/powerplatform-actions/import-solution@v1.0.0
      with:
        environment-url: "${{ secrets.TARGET_URL }}"
        app-id: "${{ secrets.CLIENT_ID }}"
        client-secret: "${{ secrets.CLIENT_SECRET }}"
        tenant-id: "${{ secrets.TENANT_ID }}"
        solution-file: "solutions/zip_files/${{ inputs.solution_name }}_v${{ needs.export-and-version.outputs.new_version }}.zip"
        import-as-holding: true
        force-overwrite: true
        publish-changes: false

    - name: Complete Upgrade (Apply Solution Upgrade)
      if: inputs.solution_type == 'Managed' && inputs.import_strategy == 'upgrade'
      uses: microsoft/powerplatform-actions/upgrade-solution@v1.0.0
      with:
        environment-url: "${{ secrets.TARGET_URL }}"
        app-id: "${{ secrets.CLIENT_ID }}"
        client-secret: "${{ secrets.CLIENT_SECRET }}"
        tenant-id: "${{ secrets.TENANT_ID }}"
        solution-name: "${{ inputs.solution_name }}"

    # =========================================================
    # MANAGED → UPDATE FLOW
    # =========================================================
    - name: Import to TARGET (Managed Update Mode)
      if: inputs.solution_type == 'Managed' && inputs.import_strategy == 'update'
      uses: microsoft/powerplatform-actions/import-solution@v1.0.0
      with:
        environment-url: "${{ secrets.TARGET_URL }}"
        app-id: "${{ secrets.CLIENT_ID }}"
        client-secret: "${{ secrets.CLIENT_SECRET }}"
        tenant-id: "${{ secrets.TENANT_ID }}"
        solution-file: "solutions/zip_files/${{ inputs.solution_name }}_v${{ needs.export-and-version.outputs.new_version }}.zip"
        force-overwrite: true
        publish-changes: true

    # =========================================================
    # UNMANAGED FLOW
    # =========================================================
    - name: Import to TARGET (Unmanaged)
      if: inputs.solution_type == 'Unmanaged'
      uses: microsoft/powerplatform-actions/import-solution@v1.0.0
      with:
        environment-url: "${{ secrets.TARGET_URL }}"
        app-id: "${{ secrets.CLIENT_ID }}"
        client-secret: "${{ secrets.CLIENT_SECRET }}"
        tenant-id: "${{ secrets.TENANT_ID }}"
        solution-file: "solutions/zip_files/${{ inputs.solution_name }}_v${{ needs.export-and-version.outputs.new_version }}.zip"
        force-overwrite: true
        publish-changes: true

    # =========================================================
    # SUMMARY
    # =========================================================
    - name: Deployment Summary
      shell: pwsh
      run: |
        
        echo "## Deployment Successful!" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY

        echo "**Solution:** ${{ inputs.solution_name }}" >> $env:GITHUB_STEP_SUMMARY

        echo "**Solution Type:** ${{ inputs.solution_type }}" >> $env:GITHUB_STEP_SUMMARY

        echo "**Version:** ${{ needs.export-and-version.outputs.new_version }}" >> $env:GITHUB_STEP_SUMMARY

        echo "**Bump Type:** ${{ inputs.version_bump }}" >> $env:GITHUB_STEP_SUMMARY

        echo "**Import Strategy:** ${{ inputs.import_strategy }}" >> $env:GITHUB_STEP_SUMMARY

        echo "**Release Notes:** ${{ inputs.release_notes }}" >> $env:GITHUB_STEP_SUMMARY

        echo "" >> $env:GITHUB_STEP_SUMMARY

        echo "### Environments" >> $env:GITHUB_STEP_SUMMARY

        echo "- DEV: Exported and Committed" >> $env:GITHUB_STEP_SUMMARY

        echo "- TARGET: Deployed Successfully" >> $env:GITHUB_STEP_SUMMARY
