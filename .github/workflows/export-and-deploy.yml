name: Export and Deploy Solution

# Manually trigger karna hoga
on:
  workflow_dispatch:
    inputs:
      solution_name:
        description: 'Solution name to export (e.g., MyFirstSolution)'
        required: true
        type: string
      solution_version:
        description: 'Version number (e.g., 1.0.0.1)'
        required: true
        default: '1.0.0.1'
        type: string

jobs:
  export-from-dev:
    runs-on: windows-latest
    env:
      RUNNER_DEBUG: 1

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        lfs: true

    - name: Setup Power Platform CLI
      uses: microsoft/powerplatform-actions/actions-install@v1.0.0

    - name: Export solution from DEV
      uses: microsoft/powerplatform-actions/export-solution@v1.0.0
      with:
        environment-url: ${{ secrets.DEV_URL }}
        app-id: ${{ secrets.CLIENT_ID }}
        client-secret: ${{ secrets.CLIENT_SECRET }}
        tenant-id: ${{ secrets.TENANT_ID }}
        solution-name: ${{ inputs.solution_name }}
        solution-output-file: 'solutions/${{ inputs.solution_name }}.zip'
        managed: false

    - name: Unpack solution
      uses: microsoft/powerplatform-actions/unpack-solution@v1.0.0
      with:
        solution-file: 'solutions/${{ inputs.solution_name }}.zip'
        solution-folder: 'solutions/${{ inputs.solution_name }}'
        solution-type: 'Unmanaged'

    - name: Commit changes to Git
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add solutions/${{ inputs.solution_name }}/
        git commit -m "Exported ${{ inputs.solution_name }} v${{ inputs.solution_version }}" || echo "No changes to commit"
        git push

  deploy-to-target:
    runs-on: windows-latest
    needs: export-from-dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        lfs: true

    - name: Setup Power Platform CLI
      uses: microsoft/powerplatform-actions/actions-install@v1.0.0

    - name: Pack solution
      uses: microsoft/powerplatform-actions/pack-solution@v1.0.0
      with:
        solution-folder: 'solutions/${{ inputs.solution_name }}'
        solution-file: 'solutions/${{ inputs.solution_name }}_managed.zip'
        solution-type: 'Managed'

    - name: Import to TARGET environment
      uses: microsoft/powerplatform-actions/import-solution@v1.0.0
      with:
        environment-url: ${{ secrets.TARGET_URL }}
        app-id: ${{ secrets.CLIENT_ID }}
        client-secret: ${{ secrets.CLIENT_SECRET }}
        tenant-id: ${{ secrets.TENANT_ID }}
        solution-file: 'solutions/${{ inputs.solution_name }}_managed.zip'
        force-overwrite: true
        publish-changes: true

    - name: Success message
      run: |
        echo "✅ Solution successfully deployed!"
        echo "Solution: ${{ inputs.solution_name }}"
        echo "Version: ${{ inputs.solution_version }}"
